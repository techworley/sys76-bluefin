name: system76-bluefin
description: Custom Bluefin image with System76 hardware scheduling and power management.
base-image: ghcr.io/ublue-os/bluefin-dx-nvidia
image-version: latest

modules:
  # 1. Add the System76 Fedora COPR repository
  - type: script
    snippets:
      - "curl -Lo /etc/yum.repos.d/szydell-system76.repo https://copr.fedorainfracloud.org/coprs/szydell/system76/repo/fedora-$(rpm -E %fedora)/szydell-system76-fedora-$(rpm -E %fedora).repo"
      - "curl -Lo /etc/yum.repos.d/kylegospo-system76-scheduler.repo https://copr.fedorainfracloud.org/coprs/kylegospo/system76-scheduler/repo/fedora-$(rpm -E %fedora)/kylegospo-system76-scheduler-fedora-$(rpm -E %fedora).repo"

  # 2. Install the System76 hardware and performance stack
  - type: rpm-ostree
    install:
      - system76-power
      - system76-firmware
      - firmware-manager
      - system76-driver
      - system76-scheduler

  # 3. Swap out default power management for System76's tools
- type: systemd
    system:
      masked:
        - tuned.service
        - power-profiles-daemon.service
      enabled:
        - com.system76.PowerDaemon.service
        - system76-firmware-daemon.service
        - com.system76.Scheduler.service
